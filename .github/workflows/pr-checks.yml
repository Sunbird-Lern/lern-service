name: PR Code Coverage and SonarQube Analysis

on:
  push:
    branches: ['**']

jobs:
  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-maven-
            
      - name: Build Core
        run: |
          mvn clean install -pl core -am -DskipTests
          
      - name: Upload Core Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: core-artifacts
          path: core/**/target

  userorg-build:
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          
      - name: Restore Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ github.run_id }}
          
      - name: Build and Generate Coverage Report (UserOrg)
        run: |
          mvn clean verify -P userorg -pl modules/userorg jacoco:report
          
      - name: Upload UserOrg Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: userorg-artifacts
          path: modules/userorg/**/target

  lms-build:
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          
      - name: Restore Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ github.run_id }}
          
      - name: Build and Generate Coverage Report (LMS)
        run: |
          mvn clean verify -P lms -pl modules/lms jacoco:report
          
      - name: Upload LMS Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: lms-artifacts
          path: modules/lms/**/target

  notification-build:
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          
      - name: Restore Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ github.run_id }}
          
      - name: Build and Generate Coverage Report (Notification)
        run: |
          mvn clean verify -P notification -pl modules/notification jacoco:report

      - name: Upload Notification Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: notification-artifacts
          path: modules/notification/**/target

  sonar-analysis:
    needs: [userorg-build, lms-build, notification-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Download Core Artifacts
        uses: actions/download-artifact@v3
        with:
          name: core-artifacts
          path: core

      - name: Download UserOrg Artifacts
        uses: actions/download-artifact@v3
        with:
          name: userorg-artifacts
          path: modules/userorg

      - name: Download LMS Artifacts
        uses: actions/download-artifact@v3
        with:
          name: lms-artifacts
          path: modules/lms

      - name: Download Notification Artifacts
        uses: actions/download-artifact@v3
        with:
          name: notification-artifacts
          path: modules/notification

      - name: Run Aggregated SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            mvn -pl lern-report verify sonar:sonar \
              -Dsonar.projectKey=sunbird-lern_lern-service \
              -Dsonar.organization=sunbird-lern \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dmaven.test.skip=true
          else
            echo "Skipping SonarQube analysis: SONAR_TOKEN is missing"
          fi
